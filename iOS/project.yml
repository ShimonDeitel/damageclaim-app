name: Damageclaim
options:
  bundleIdPrefix: com.shimondeitel.damageclaim
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Damageclaim:
    type: application
    platform: iOS
    sources:
      - path: Damageclaim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.damageclaim
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Damageclaim/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DamageclaimTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DamageclaimTests
      - path: Damageclaim.storekit
    dependencies:
      - target: Damageclaim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.damageclaim.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DamageclaimUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DamageclaimUITests
    dependencies:
      - target: Damageclaim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.damageclaim.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Damageclaim:
    build:
      targets:
        Damageclaim: all
        DamageclaimTests: [test]
        DamageclaimUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Damageclaim.storekit
    test:
      config: Debug
      storeKitConfiguration: Damageclaim.storekit
      targets:
        - DamageclaimTests
        - DamageclaimUITests
    archive:
      config: Release
